services:
  - type: web
    name: safemap-backend
    runtime: python
    plan: free
    buildCommand: uv sync
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./safemap.db
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://your-frontend-url.vercel.app
    healthCheckPath: /health
